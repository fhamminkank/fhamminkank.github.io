<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Đăng ký - Flower Shop</title>
    <link rel="stylesheet" href="css/dangky.css">

</head>
<body>
<script src="js/dangky.js" defer></script>

    <div id="wrap">
        <header id="header">
            <nav id="menu_top">
                <ul class="level1">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Introduction</a></li>
                    <li><a href="#">Flower Category</a></li>
                    <li><a href="dangky.html">Register</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="lienhe.html">Contact</a></li>
                </ul>
            </nav>
        </header>

       <section id="center_content" style="min-height: 400px;">
    <div class="form_container">
        <div class="title"> Đăng ký thành viên</div>
        
        <form action="#" method="post" style="margin-top: 20px;">
            <div class="form_group">
                <label>Họ và tên:</label>
                <input type="text" name="fullname" placeholder="Nhập đầy đủ họ và tên..." required />
            </div>
            <div class="form_group">
                <label>Tên đăng nhập:</label>
                <input type="text" name="username" placeholder="Nhập username..." required />
            </div>

            <div class="form_group">
                <label>Mật khẩu:</label>
                <div class="password_wrapper" style="position: relative;">
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu..." required>
                    <span class="toggle_password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; z-index: 10;">👁️</span>
                </div>
            </div> <div class="form_group">
                <label>Email:</label>
                <input type="email" name="email" required />
            </div>

            <div class="form_group">
                <label>Điện thoại:</label>
                <input type="text" name="phone" required />
            </div>
            <div class="form_group">
                <label>Địa chỉ:</label>
                <input type="text" name="address" required />
            </div>
            <button type="submit" class="btn_submit">Đăng ký</button>
        </form>
    </div>
</section>

        <div style="clear:both"></div>
        <footer id="footer">
            <div class="left">Flower Shop Co., Ltd - Vietnam Branch...</div>
            <div class="right"><img src="img.signature.png" width="97" height="29" /></div>
        </footer>
    </div>
</body>
</html>
